.gantt-bar{transition:box-shadow .2s,transform .1s;box-shadow:0 2px 4px rgba(0,0,0,.1);cursor:move;user-select:none;touch-action:pan-y}
.milestone-marker{width:16px;height:16px;transform:rotate(45deg);cursor:move;box-shadow:1px 1px 3px rgba(0,0,0,.2);transition:transform .1s;touch-action:pan-y}
.milestone-marker:hover{transform:rotate(45deg) scale(1.2)}
.locked-mode .gantt-bar,.locked-mode .milestone-marker{cursor:pointer}
.locked-mode .resize-handle{display:none!important}
.task-row{cursor:grab;transition:background-color .2s}.task-row:active{cursor:grabbing}.task-row:hover{background-color:#f8fafc}
.today-line{position:absolute;top:0;bottom:0;width:2px;background:#ef4444;z-index:15;box-shadow:0 0 8px rgba(239,68,68,.5);pointer-events:none}
.modal{animation:modalPop .2s ease-out forwards}
@keyframes modalPop{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.animate-fade-in-down{animation:fadeInDown .3s ease-out forwards}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:#f1f5f9;border-radius:4px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
.child-task-indent{position:relative}
.child-task-indent::before{content:'';position:absolute;left:16px;top:-10px;bottom:50%;width:10px;border-left:2px solid #cbd5e1;border-bottom:2px solid #cbd5e1;border-bottom-left-radius:4px}
.cal-cell{transition:background-color .2s;cursor:pointer;position:relative}.cal-cell:hover{background-color:#f1f5f9}
.cal-add-btn{opacity:0;transition:opacity .2s;position:absolute;top:2px;right:2px}.cal-cell:hover .cal-add-btn{opacity:1}
@media(max-width:640px){.cal-add-btn{opacity:1}}
.quick-check{transition:all .2s;flex-shrink:0}
.overdue-row{border-left:3px solid #ef4444}
/* ─── タイムライン ─── */
.tl-hour{height:64px;border-top:1px solid #e2e8f0;position:relative}
.tl-hour-half{position:absolute;top:50%;left:40px;right:0;border-top:1px dashed #f0f4f8}
.tl-task{position:absolute;border-radius:6px;overflow:hidden;cursor:pointer;z-index:10;transition:box-shadow .15s,opacity .15s;min-height:24px}
.tl-task:hover{box-shadow:0 4px 12px rgba(0,0,0,.2);z-index:20}
.tl-now-line{position:absolute;left:0;right:0;height:2px;background:#ef4444;z-index:25;pointer-events:none}
.tl-now-dot{position:absolute;width:10px;height:10px;background:#ef4444;border-radius:50%;left:36px;transform:translate(-50%,-50%);z-index:26;pointer-events:none}
/* ─── タブ ─── */
.tab-row{display:flex;background:rgba(148,163,184,.18);padding:3px;border-radius:10px;gap:2px}
.tab-btn{flex:1;padding:5px 4px;font-size:10px;font-weight:700;border-radius:6px;color:#64748b;transition:all .15s;text-align:center;white-space:nowrap;line-height:1.3}
.tab-btn.active{background:#fff;color:#4f46e5;box-shadow:0 1px 4px rgba(0,0,0,.12)}
/* ─── アジェンダ ─── */
.agenda-date-hdr{position:sticky;top:0;z-index:10;background:linear-gradient(to bottom,#f8fafc,#f8fafc)}
/* ─── スワイプアニメーション ─── */
@keyframes slideInRight{from{transform:translateX(28%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideInLeft{from{transform:translateX(-28%);opacity:0}to{transform:translateX(0);opacity:1}}
.swipe-in-right{animation:slideInRight .28s cubic-bezier(.25,.46,.45,.94)}
.swipe-in-left{animation:slideInLeft .28s cubic-bezier(.25,.46,.45,.94)}
/* ─── 一括操作バー ─── */
@keyframes slideUpBar{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.bulk-bar{animation:slideUpBar .2s ease-out}
/* ─── ハビットトラッカー ─── */
.habit-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;display:inline-block}
/* ─── 年間カレンダー ─── */
.year-day{transition:background-color .1s;cursor:pointer;border-radius:3px}
.year-day:hover{background-color:#e0e7ff}
/* ─── チェックリスト ─── */
.cl-item.done span{text-decoration:line-through;opacity:.5}
/* ─── タブドラッグ ─── */
.tab-btn.tab-dragging{opacity:.45;transform:scale(.92);transition:none!important;box-shadow:0 0 0 2px #6366f1 inset}
.tab-btn.tab-drag-over{background:rgba(99,102,241,.18)!important;outline:2px dashed #6366f1;outline-offset:-2px}
/* ─── ダークモード ─── */
html.dark{color-scheme:dark}
html.dark body{background-color:#0f172a!important;color:#e2e8f0!important}
html.dark .bg-white{background-color:#1e293b!important}
html.dark .bg-slate-50{background-color:#0f172a!important}
html.dark .bg-slate-100{background-color:#1e293b!important}
html.dark .bg-slate-200{background-color:#334155!important}
html.dark .text-slate-900,.dark .text-slate-800{color:#f1f5f9!important}
html.dark .text-slate-700{color:#e2e8f0!important}
html.dark .text-slate-600{color:#cbd5e1!important}
html.dark .text-slate-500{color:#94a3b8!important}
html.dark .text-slate-400{color:#64748b!important}
html.dark .border-slate-100{border-color:#334155!important}
html.dark .border-slate-200{border-color:#475569!important}
html.dark input,html.dark select,html.dark textarea{background-color:#334155!important;color:#f1f5f9!important;border-color:#475569!important}
html.dark .task-row:hover{background-color:#334155!important}
html.dark .divide-y>*{border-color:#334155!important}
html.dark .year-day:hover{background-color:#334155!important}
html.dark .tl-hour{border-top-color:#334155}
html.dark .tl-hour-half{border-top-color:#1e293b}
html.dark .agenda-date-hdr{background:linear-gradient(to bottom,#0f172a,#0f172a)!important}
html.dark .tab-btn.active{background:#1e293b!important}
html.dark .tab-row{background:rgba(51,65,85,.5)!important}
html.dark .hover\:bg-slate-50:hover,.dark .hover\:bg-slate-100:hover{background-color:#334155!important}
html.dark .cal-cell:hover{background-color:#334155!important}
html.dark .child-task-indent::before{border-color:#475569}
html.dark ::-webkit-scrollbar-track{background:#1e293b}
html.dark ::-webkit-scrollbar-thumb{background:#475569}
html.dark .bg-indigo-50{background-color:rgba(30,27,75,.6)!important}
html.dark .bg-emerald-50{background-color:rgba(6,47,36,.5)!important}
html.dark .bg-amber-50{background-color:rgba(78,52,18,.4)!important}
html.dark .bg-red-50{background-color:rgba(69,10,10,.4)!important}
html.dark .bg-blue-50{background-color:rgba(23,37,84,.5)!important}
html.dark .shadow-sm{box-shadow:0 1px 2px rgba(0,0,0,.5)!important}
html.dark .shadow-md{box-shadow:0 4px 6px rgba(0,0,0,.6)!important}
/* ─── 印刷用スタイル ─── */
@media print{
 html.dark{color-scheme:light}
 html.dark body,html.dark .bg-white,html.dark .bg-slate-50,html.dark .bg-slate-100{background:white!important;color:#0f172a!important}
 html.dark *{color:#0f172a!important;border-color:#cbd5e1!important}
 body{background:white!important}
 /* ヘッダー・タブ・操作系UI・モーダルを非表示 */
 header,#mobile-tab-area,nav,
 /* オーバーレイ系: 全画面モーダル(.fixed.inset-0) と body 直下の固定要素(toast/banner) */
 .fixed.inset-0,body>.fixed,
 /* 既知のバナー・モーダルID */
 #welcome-modal,#reset-modal,#export-reminder-banner,#storage-warning-banner,
 #weekly-controls,#calendar-controls,#today-timeline-controls,#yearly-controls,
 button[onclick*="showAddModal"],button[onclick*="showSettingsModal"],
 button[onclick*="showAddAssignee"],button[onclick*="centerToday"],
 button[onclick*="changeWeeklyWeek"],button[onclick*="changeCalMonth"],
 button[onclick*="changeYear"],button[onclick*="changeTimelineDay"],
 #btn-undo,#btn-redo,#btn-lock,#import-file,
 .bulk-bar,.tab-row,.cal-add-btn,.resize-handle{display:none!important}
 /* スクロール解除 */
 .overflow-hidden,.overflow-auto,.overflow-y-auto,.overflow-x-auto{overflow:visible!important;max-height:none!important;height:auto!important}
 /* 装飾を簡略化 */
 .shadow-sm,.shadow,.shadow-md,.shadow-lg,.shadow-xl,.shadow-2xl,.shadow-inner{box-shadow:none!important}
 .rounded-xl,.rounded-2xl,.rounded-lg{border-radius:4px!important}
 /* レイアウト調整 */
 .flex-1,.lg\:flex-1{flex:1 1 auto!important}
 .max-w-screen-2xl{max-width:none!important}
 /* 改ページ補助 */
 .agenda-date-hdr,h1,h2,h3{page-break-after:avoid}
 .gantt-bar,.tl-task,tr{page-break-inside:avoid}
 /* フォントサイズ調整 */
 body{font-size:10pt!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
 /* リンクのURL表示は不要 */
 a:after{content:"" !important}
}

</style>
</head>

<!-- ヘッダー -->
<div class="bg-white border-b border-slate-200 z-50 shadow-sm flex-shrink-0">

   <div class="w-8 h-8 sm:w-9 sm:h-9 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-xl flex items-center justify-center shadow-md"><i class="far fa-calendar-check text-white text-base sm:text-lg"></i></div>
   <div><h1 class="text-sm sm:text-xl font-bold tracking-tight leading-none">パーソナル予定管理</h1><p class="text-[9px] sm:text-[10px] text-indigo-600 font-medium mt-0.5" id="header-today"></p></div>

  <div class="flex items-center gap-x-1.5 sm:gap-x-2">
   <input type="file" id="import-file" accept=".json" class="hidden" onchange="importData(event)">

    <button onclick="document.getElementById('import-file').click()" aria-label="JSONインポート" class="w-7 h-7 sm:w-8 sm:h-8 flex items-center justify-center rounded hover:bg-white text-slate-600" title="JSONインポート"><i class="fas fa-upload text-xs"></i></button>
    <div class="w-px h-3 bg-slate-200"></div>
    <button onclick="exportData()" aria-label="JSONエクスポート" class="w-7 h-7 sm:w-8 sm:h-8 flex items-center justify-center rounded hover:bg-white text-slate-600" title="JSONエクスポート"><i class="fas fa-download text-xs"></i></button>
    <div class="w-px h-3 bg-slate-200"></div>
    <button onclick="exportToIcal()" aria-label="iCalエクスポート" class="w-7 h-7 sm:w-8 sm:h-8 flex items-center justify-center rounded hover:bg-white text-indigo-500" title="iCalエクスポート"><i class="far fa-calendar-alt text-xs"></i></button>
   </div>

   </div>
   <button onclick="showSearchModal()" class="w-8 h-8 flex items-center justify-center bg-slate-50 hover:bg-slate-100 text-slate-500 rounded-lg border border-slate-200" title="検索 (/)" aria-label="タスク検索"><i class="fas fa-search text-xs"></i></button>
   <button onclick="toggleLock()" aria-label="編集ロック切替" id="btn-lock" class="w-8 h-8 flex items-center justify-center bg-slate-50 hover:bg-slate-100 text-slate-500 rounded-lg border border-slate-200" title="ロック"><i id="lock-icon" class="fas fa-unlock text-xs"></i></button>

 </div>

<!-- メイン -->
<div class="flex-1 max-w-screen-2xl w-full mx-auto px-2 sm:px-6 py-2 sm:py-3 flex flex-col min-h-0">

 <!-- モバイルタブ 2段 (JS動的レンダリング) -->
 <div class="flex lg:hidden flex-col gap-1 mb-2 flex-shrink-0" id="mobile-tab-area">
  <!-- buildTabs() で生成 -->
 </div>

 <div class="flex flex-col lg:flex-row gap-3 sm:gap-4 flex-1 min-h-0">

  <!-- 左ペイン -->
  <div id="view-list" class="flex-col w-full lg:w-[32%] xl:w-[28%] bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex min-h-0">
   <div class="px-2 sm:px-3 py-2 bg-slate-50 border-b border-slate-200 flex flex-col gap-1.5 flex-shrink-0">
    <div class="flex items-center justify-between">
     <div class="text-[11px] font-bold text-slate-600 flex items-center gap-1"><i class="fas fa-filter text-slate-400"></i>予定一覧</div>
     <div class="flex gap-1">
      <button id="btn-bulk-toggle" onclick="toggleBulkMode()" class="flex items-center gap-1 px-2 py-1 text-[10px] bg-slate-100 text-slate-500 rounded hover:bg-indigo-100 hover:text-indigo-600 border border-slate-200 font-bold" title="一括操作モード"><i class="fas fa-check-square"></i><span>一括操作</span></button>
      <span id="hc-btn-list"></span>
      <span id="hr-btn-list"></span>

      <button onclick="clearAllData()" class="p-1.5 text-xs bg-red-50 text-red-500 rounded hover:bg-red-100 border border-red-100" title="全データ削除"><i class="fas fa-trash-alt"></i></button>
     </div>
    </div>
    <div class="relative w-full">
     <i class="fas fa-search absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-400 text-[10px]"></i>
     <input type="text" id="filter-input" oninput="refreshViews()" placeholder="名前・タグ・場所・色で検索..." class="w-full pl-7 pr-3 py-1.5 bg-white border border-slate-300 rounded shadow-inner text-[11px] focus:outline-none focus:border-indigo-500">
    </div>

// HTMLエスケープ：ユーザー入力をinnerHTMLに埋める前に必ず通す
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
// iCal RFC5545エスケープ
function escIcs(s){return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\r?\n/g,'\\n');}
// localStorage 安全保存（容量超過・拒否時にユーザーへ通知）
let _quotaWarnTs=0;
function safeStore(k,v){try{localStorage.setItem(k,v);return true;}catch(e){if(Date.now()-_quotaWarnTs>5000){_quotaWarnTs=Date.now();if(typeof customAlert==='function')customAlert('データを保存できません（容量超過または保存拒否）。エクスポートで退避してください','danger');}console.warn('[safeStore] failed:',k,e);return false;}}

// 安全な deep clone（チェックリスト等の配列複製用）

function showStorageUnavailableWarning(){if(_storageWarnDismissed)return;if(document.getElementById('storage-warning-banner'))return;const b=document.createElement('div');b.id='storage-warning-banner';b.className='fixed top-0 left-0 right-0 bg-amber-50 border-b-2 border-amber-400 z-[200] px-3 py-2 flex items-start gap-2';b.innerHTML='<i class="fas fa-exclamation-triangle text-amber-600 mt-0.5 flex-shrink-0"></i><div class="flex-1 text-[11px] leading-relaxed text-amber-900"><b>データを保存できません</b>：プライベートブラウジング中・Cookie無効・容量不足の可能性があります。入力した内容はタブを閉じると失われます。</div><button onclick="dismissStorageWarning()" class="flex-shrink-0 text-amber-700 hover:bg-amber-100 px-2 py-1 rounded text-[11px] font-bold" title="閉じる">×</button>';document.body.appendChild(b);}

function isOverdue(t){if(t.isMilestone||t.repeat&&t.repeat!=='none')return false;const e=t.end||t.start;return e<toDateStr(new Date())&&t.status!=='完了'&&t.progress<100;}
function timeToMin(s){if(!s)return null;const[h,m]=s.split(':').map(Number);return h*60+m;}

function calcChecklistProgress(cl){if(!cl||!cl.length)return null;return Math.round(cl.filter(i=>i.done).length/cl.length*100);}
function checklistHtml(cl){if(!cl||!cl.length)return'';const done=cl.filter(i=>i.done).length,total=cl.length,pct=Math.round(done/total*100);return`<div class="mt-1.5 text-[9px] text-slate-500 flex items-center gap-2"><i class="fas fa-check-square text-indigo-400 flex-shrink-0"></i><div class="flex-1 h-1 bg-slate-200 rounded-full overflow-hidden"><div class="h-full bg-emerald-500 rounded-full" style="width:${pct}%"></div></div><span class="flex-shrink-0 font-bold ${pct===100?'text-emerald-600':'text-slate-500'}">${done}/${total}</span></div>`;}
function isRepeatActiveDay(task,dateStr){if(!task.repeat||task.repeat==='none')return false;if(task.start>dateStr)return false;if(task.end&&task.end<dateStr)return false;const d=new Date(dateStr);if(task.repeat==='daily')return true;if(task.repeat==='weekly'){if(task.repeatDays&&task.repeatDays.length)return task.repeatDays.includes(d.getDay());return new Date(task.start).getDay()===d.getDay();}if(task.repeat==='monthly')return new Date(task.start).getDate()===d.getDate();return false;}
function calcStreak(task){const completed=new Set(task.completedDates||[]);let streak=0;const today=new Date();for(let i=0;i<=365;i++){const d=new Date(today);d.setDate(d.getDate()-i);const ds=toDateStr(d);if(!isRepeatActiveDay(task,ds))continue;if(i===0&&!completed.has(ds))continue;if(completed.has(ds))streak++;else break;}return streak;}
function minToDisp(m){const h=Math.floor(m/60),mn=m%60;return`${h}:${String(mn).padStart(2,'0')}`;}

function addSwipe(el,onLeft,onRight){
 let sx=0,sy=0;
 el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
 el.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){
   if(dx<0){pendingSwipeAnim='left';onLeft();}else{pendingSwipeAnim='right';onRight();}
  }
 },{passive:true});
}
function applySwipeAnim(){
 if(!pendingSwipeAnim)return;
 const av=mob?cmt:cmv;const el=document.getElementById(VIEW_CM[av]);if(!el){pendingSwipeAnim=null;return;}
 const cls=pendingSwipeAnim==='left'?'swipe-in-right':'swipe-in-left';
 el.classList.remove('swipe-in-right','swipe-in-left');
 requestAnimationFrame(()=>{el.classList.add(cls);setTimeout(()=>el.classList.remove(cls),350);});
 pendingSwipeAnim=null;
}

function customAlert(msg,type='warning'){const t=document.createElement('div');const bc=type==='success'?'border-emerald-500':type==='danger'?'border-red-500':'border-indigo-500';const ic=type==='success'?'fa-check-circle text-emerald-500':type==='danger'?'fa-exclamation-triangle text-red-500':'fa-info-circle text-indigo-500';t.className=`fixed top-14 right-4 bg-white border-l-4 ${bc} shadow-lg rounded px-3 py-2 z-[200] flex items-center gap-2 animate-fade-in-down`;t.setAttribute("role",type==="danger"?"alert":"status");t.setAttribute("aria-live",type==="danger"?"assertive":"polite");t.innerHTML=`<i class="fas ${ic}"></i><div class="font-bold text-[11px] text-slate-700">${esc(msg)}</div>`;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);}

 }
 // ── デスクトップタブ ──

  dArea.innerHTML='';

function _mkBtn(v,mode){
 const m=TAB_META[v];if(!m)return document.createDocumentFragment();
 const btn=document.createElement('button');
 const active=mode==='mobile'?cmt===v:cmv===v;
 btn.className='tab-btn'+(active?' active':'');
 btn.id=`tab-${mode}-${v}`;btn.dataset.view=v;btn.dataset.mode=mode;
 const label=mode==='mobile'?m.mLabel:m.label;
 btn.innerHTML=`${m.icon?`<i class="${m.icon} mr-1${m.ic?' '+m.ic:''}"></i>`:''}${label}`;
 if(mode==='mobile')btn.onclick=()=>setMobileTab(v);else btn.onclick=()=>setMainView(v);

}
function attachTabHint(btn){
 // 長押しガイドのツールチップ

}
function _attachTabDrag(){
 document.querySelectorAll('.tab-btn[data-view],.tab-btn#tab-mobile-list').forEach(btn=>{
  // mouse drag (desktop)
  btn.draggable=true;
  btn.ondragstart=e=>{if(!btn.dataset.view)return;tabDragData={id:btn.dataset.view};btn.classList.add('tab-dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',btn.dataset.view);};
  btn.ondragend=()=>{btn.classList.remove('tab-dragging');document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('tab-drag-over'));};
  btn.ondragover=e=>{e.preventDefault();if(tabDragData&&btn.dataset.view&&btn.dataset.view!==tabDragData.id)btn.classList.add('tab-drag-over');};
  btn.ondragleave=()=>btn.classList.remove('tab-drag-over');
  btn.ondrop=e=>{e.preventDefault();btn.classList.remove('tab-drag-over');if(!tabDragData||!btn.dataset.view||btn.dataset.view===tabDragData.id)return;_swapTab(tabDragData.id,btn.dataset.view);tabDragData=null;};
  // touch (mobile 長押し)
  let pressTimer=null,dragging=false,startX=0,startY=0;
  btn.addEventListener('touchstart',e=>{
   startX=e.touches[0].clientX;startY=e.touches[0].clientY;
   pressTimer=setTimeout(()=>{
    if(!btn.dataset.view)return;
    dragging=true;tabDragData={id:btn.dataset.view};
    btn.classList.add('tab-dragging');
    navigator.vibrate&&navigator.vibrate([30]);
   },400);
  },{passive:true});
  btn.addEventListener('touchmove',e=>{
   const dx=Math.abs(e.touches[0].clientX-startX),dy=Math.abs(e.touches[0].clientY-startY);
   if(dx>10||dy>10){clearTimeout(pressTimer);pressTimer=null;}
   if(!dragging||!tabDragData)return;
   e.preventDefault();
   document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('tab-drag-over'));
   const el=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY);
   const tgt=el?.closest('.tab-btn[data-view]');
   if(tgt&&tgt!==btn)tgt.classList.add('tab-drag-over');
  },{passive:false});
  btn.addEventListener('touchend',e=>{
   clearTimeout(pressTimer);pressTimer=null;
   if(!dragging||!tabDragData){dragging=false;tabDragData=null;return;}
   btn.classList.remove('tab-dragging');dragging=false;
   document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('tab-drag-over','tab-dragging'));
   const el=document.elementFromPoint(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
   const tgt=el?.closest('.tab-btn[data-view]');
   if(tgt&&tgt.dataset.view&&tgt.dataset.view!==tabDragData.id)_swapTab(tabDragData.id,tgt.dataset.view);
   tabDragData=null;
  },{passive:true});
 });
}
function _swapTab(fromId,toId){
 const fi=tabOrder.indexOf(fromId),ti=tabOrder.indexOf(toId);

 tabOrder.splice(fi,1);tabOrder.splice(ti,0,fromId);

}

function validateImportData(d){
 if(!d||typeof d!=='object'||Array.isArray(d))throw new Error('JSONがオブジェクトではありません');
 if(!Array.isArray(d.tks))throw new Error('tksが配列ではありません');
 if(!d.aps||typeof d.aps!=='object'||Array.isArray(d.aps))throw new Error('apsがオブジェクトではありません');
 if(d.tks.length>10000)throw new Error(`タスク数が多すぎます（${d.tks.length}件 > 上限10000件）`);
 // フィールド長制限（入力フォームのmaxlengthと整合）
 const LIM={name:200,description:10000,tags:500,url:2000,location:200,memo:2000,role:100};
 const ids=new Set();
 for(const t of d.tks){
  if(!t||typeof t!=='object'||Array.isArray(t))throw new Error('不正なタスクデータが含まれています');
  if(typeof t.id!=='string'||!t.id)throw new Error('タスクのidが不正です');
  if(ids.has(t.id))throw new Error('重複するタスクID: '+t.id);
  ids.add(t.id);
  if(typeof t.name!=='string')throw new Error('タスク名が不正です（id='+t.id+'）');
  if(t.name.length>LIM.name)throw new Error(`タスク名が長すぎます（${t.name.length}文字 > ${LIM.name}）: id=${t.id}`);
  if(t.description&&typeof t.description==='string'&&t.description.length>LIM.description)throw new Error(`詳細が長すぎます（${t.description.length}文字 > ${LIM.description}）: id=${t.id}`);
  if(t.tags&&typeof t.tags==='string'&&t.tags.length>LIM.tags)throw new Error(`タグが長すぎます: id=${t.id}`);
  if(t.url&&typeof t.url==='string'&&t.url.length>LIM.url)throw new Error(`URLが長すぎます: id=${t.id}`);
  if(t.location&&typeof t.location==='string'&&t.location.length>LIM.location)throw new Error(`場所が長すぎます: id=${t.id}`);
  if(t.parentId!=null&&typeof t.parentId!=='string')throw new Error('parentIdが不正です（id='+t.id+'）');
  if(t.favorite!=null&&typeof t.favorite!=='boolean')throw new Error('favoriteフラグが不正です（id='+t.id+'）');
 }
 // parentId参照解決と循環検出
 for(const t of d.tks){
  if(!t.parentId)continue;
  if(!ids.has(t.parentId))throw new Error('親タスクが存在しません: '+t.parentId);
  let cur=t,depth=0;const seen=new Set();
  while(cur&&cur.parentId){
   if(seen.has(cur.id))throw new Error('parentIdに循環参照があります');
   seen.add(cur.id);
   cur=d.tks.find(x=>x.id===cur.parentId);
   if(++depth>100)throw new Error('parentIdの階層が深すぎます（>100）');
  }
 }
 // aps構造
 for(const k in d.aps){
  if(k.length>LIM.name)throw new Error(`担当者名が長すぎます: ${k.substring(0,30)}...`);
  const v=d.aps[k];if(!v||typeof v!=='object'||Array.isArray(v))throw new Error('担当者データが不正です: '+k);
  if(v.role&&typeof v.role==='string'&&v.role.length>LIM.role)throw new Error(`担当者の役割が長すぎます: ${k}`);
  if(v.memo&&typeof v.memo==='string'&&v.memo.length>LIM.memo)throw new Error(`担当者のメモが長すぎます: ${k}`);
 }
 return true;
}
function importData(e){

 const r=new FileReader();
 r.onload=ev=>{
  try{
   const d=JSON.parse(ev.target.result);
   validateImportData(d);
   tks=d.tks;aps=d.aps;
   initOrderIfNeeded();commitChange();refreshViews();

  }
  e.target.value='';
 };
 r.onerror=()=>{customAlert('ファイル読込エラー','danger');e.target.value='';};
 r.readAsText(f);
}
function exportToIcal(){let ics="BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Personal Schedule//EN\r\n";tks.forEach(t=>{const st=t.startTime?t.start.replace(/-/g,'')+`T${t.startTime.replace(':','')}00`:t.start.replace(/-/g,'')+'T000000';const en=(t.endTime&&t.end)?t.end.replace(/-/g,'')+`T${t.endTime.replace(':','')}00`:(t.end||t.start).replace(/-/g,'')+'T235900';ics+=`BEGIN:VEVENT\r\nUID:${t.id}@sched\r\nDTSTART:${st}\r\nDTEND:${en}\r\nSUMMARY:${escIcs(t.name)}\r\n`;if(t.description)ics+=`DESCRIPTION:${escIcs(t.description)}\r\n`;if(t.repeat&&t.repeat!=='none'){let rr='FREQ=';if(t.repeat==='daily')rr+='DAILY';else if(t.repeat==='weekly'){const days=t.repeatDays&&t.repeatDays.length?t.repeatDays.map(d=>['SU','MO','TU','WE','TH','FR','SA'][d]).join(','):['SU','MO','TU','WE','TH','FR','SA'][new Date(t.start).getDay()];rr+='WEEKLY;BYDAY='+days;}else rr+='MONTHLY;BYMONTHDAY='+new Date(t.start).getDate();ics+=`RRULE:${rr}\r\n`;}ics+='END:VEVENT\r\n';});ics+='END:VCALENDAR';const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([ics],{type:'text/calendar'})),download:'schedule.ics'});a.click();URL.revokeObjectURL(a.href);customAlert('iCalを書き出しました','success');}

let _searchDebounceTimer=null;

function renderSearchResults(q){
 const r=document.getElementById('search-results');if(!r)return;
 const qq=String(q||'').trim().toLowerCase();
 if(!qq){r.innerHTML='<div class="p-8 text-center text-[12px] text-slate-400"><i class="fas fa-search text-2xl mb-2 opacity-30"></i><div>キーワードを入力してください</div><div class="mt-3 text-[10px] text-slate-300 leading-relaxed">タスク名・タグ・詳細・場所・担当者を横断検索します</div></div>';return;}
 // スコア付きフィルタ：タスク名一致を優先、次にタグ・場所・担当者、最後に詳細
 const matches=[];
 for(const t of tks){
  if(!t||typeof t.name!=='string')continue;
  const n=(t.name||'').toLowerCase();
  const tag=(t.tags||'').toLowerCase();
  const loc=(t.location||'').toLowerCase();
  const ass=(t.assignee||'').toLowerCase();
  const desc=(t.description||'').toLowerCase();
  let score=0,where=[];
  if(n.includes(qq)){score+=100;where.push('名前');}
  if(tag.includes(qq)){score+=30;where.push('タグ');}
  if(loc.includes(qq)){score+=20;where.push('場所');}
  if(ass.includes(qq)){score+=20;where.push('担当');}
  if(desc.includes(qq)){score+=10;where.push('詳細');}
  if(score>0)matches.push({t,score,where});
 }
 matches.sort((a,b)=>b.score-a.score||(new Date(b.t.start||0))-(new Date(a.t.start||0)));
 if(!matches.length){r.innerHTML='<div class="p-8 text-center text-[12px] text-slate-400"><i class="fas fa-inbox text-2xl mb-2 opacity-30"></i><div>該当するタスクが見つかりません</div></div>';return;}
 // 上位50件まで描画
 const top=matches.slice(0,50);
 const items=top.map(({t,where})=>{
  const cObj=getColorObj(t.color);
  const isDone=t.progress===100||t.status==='完了';
  const dateStr=(t.start||'').replace(/-/g,'/');
  const dateEnd=(t.end&&t.end!==t.start)?'~'+t.end.replace(/-/g,'/'):'';
  const ass=formatAssigneeName(t.assignee);
  const whereLabel=where.length?where.join('・'):'';
  return `<div onclick="document.getElementById('search-modal').remove();editTask('${esc(t.id)}')" class="flex items-start gap-2 px-4 py-2.5 border-b border-slate-100 hover:bg-indigo-50 cursor-pointer">

   <div class="flex-1 min-w-0">
    <div class="flex items-center gap-1.5"><span class="text-[12px] font-bold text-slate-700 truncate ${isDone?'line-through opacity-60':''}">${esc(t.name)}</span>${isDone?'<i class="fas fa-check text-emerald-500 text-[10px] flex-shrink-0"></i>':''}${t.isMilestone?'<i class="fas fa-gem text-amber-500 text-[10px] flex-shrink-0"></i>':''}</div>
    <div class="flex items-center gap-2 mt-0.5 text-[10px] text-slate-500">
     <span><i class="far fa-calendar-alt mr-1"></i>${dateStr}${dateEnd}</span>
     ${ass!=='未設定'?`<span class="text-slate-400">·</span><span>${esc(ass)}</span>`:''}
     ${t.location?`<span class="text-slate-400">·</span><span class="truncate"><i class="fas fa-map-marker-alt mr-0.5 text-red-300"></i>${esc(t.location)}</span>`:''}
    </div>
    ${whereLabel?`<div class="text-[9px] text-indigo-400 mt-0.5">マッチ: ${esc(whereLabel)}</div>`:''}
   </div>
   <i class="fas fa-chevron-right text-slate-300 text-[10px] mt-1.5 flex-shrink-0"></i>
  </div>`;
 }).join('');
 const more=matches.length>50?`<div class="px-4 py-2 text-[10px] text-slate-400 text-center bg-slate-50 border-t border-slate-100">${matches.length-50}件はキーワードを絞り込んで表示</div>`:'';
 r.innerHTML=items+more;
}

document.addEventListener('keydown',e=>{

  if(e.key==='z'){e.preventDefault();undo();return;}
  if(e.key==='y'||(e.shiftKey&&e.key==='Z')){e.preventDefault();redo();return;}

// キーワード検索結果のキャッシュ：tksの内容変更時に invalidateFilterCache() で破棄
let _kwCacheKey=null,_kwCacheIds=null;
function invalidateFilterCache(){_kwCacheKey=null;_kwCacheIds=null;}
function getFilteredTasks(){
 const kw=document.getElementById('filter-input').value.toLowerCase();
 const cm2={blue:'青ブルー',emerald:'緑エメラルド',amber:'黄アンバー',red:'赤レッド',purple:'紫パープル',slate:'灰スレート'};
 let f=tks;
 if(kw){
  // キャッシュキー: キーワード + tks長 + 末尾要素のidで簡易ハッシュ（破壊的編集はinvalidateFilterCacheで明示破棄）
  const cacheKey=kw+'|'+tks.length+'|'+(tks.length?tks[tks.length-1].id:'');
  let mid;
  if(_kwCacheKey===cacheKey&&_kwCacheIds){
   mid=_kwCacheIds;
  }else{
   mid=new Set();
   tks.forEach(t=>{if([t.name,formatAssigneeName(t.assignee),t.description||'',t.tags||'',t.type||'',t.location||'',(t.color&&cm2[t.color])||''].some(s=>s.toLowerCase().includes(kw))){mid.add(t.id);if(t.parentId)mid.add(t.parentId);}});
   _kwCacheKey=cacheKey;_kwCacheIds=mid;
  }
  f=f.filter(t=>mid.has(t.id));
 }
 if(filterStatus!=='all'){if(filterStatus==='overdue')f=f.filter(t=>isOverdue(t));else f=f.filter(t=>t.status===filterStatus);}
 if(filterPriority!=='all')f=f.filter(t=>(t.priority||'none')===filterPriority);
 if(filterAssignee!=='all')f=f.filter(t=>t.assignee===filterAssignee);
 return{filtered:f,kw};
}
function getVisibleTasks(){
 const{filtered,kw}=getFilteredTasks();const roots=filtered.filter(t=>!t.parentId).sort((a,b)=>(a.order||0)-(b.order||0));const children=filtered.filter(t=>t.parentId);
 let result=[],vcids=new Set();
 roots.forEach(root=>{result.push(root);const mc=children.filter(c=>c.parentId===root.id);mc.forEach(c=>vcids.add(c.id));if(exps.has(root.id)||kw!==''){mc.sort((a,b)=>(a.order||0)-(b.order||0));mc.forEach(c=>{c._isChild=true;result.push(c);});}});
 filtered.forEach(t=>{if(!result.some(r=>r.id===t.id)&&!vcids.has(t.id)){t._isChild=false;result.push(t);}});
 document.getElementById('empty-state').style.display=(result.length===0&&tks.length>0)?'flex':'none';
 return result;
}
function getTasksForDate(list,dateStr){
 const d=new Date(dateStr),day=d.getDay(),date=d.getDate();
 return list.filter(t=>{
  if(!t.repeat||t.repeat==='none')return t.start<=dateStr&&(t.end||t.start)>=dateStr;
  if(t.start>dateStr)return false;if(t.end&&t.end<dateStr)return false;
  if(t.repeat==='daily')return true;if(t.repeat==='weekly'&&(t.repeatDays&&t.repeatDays.length?t.repeatDays.includes(day):new Date(t.start).getDay()===day))return true;if(t.repeat==='monthly'&&new Date(t.start).getDate()===date)return true;return false;
 }).map(t=>{
  if(t.repeat&&t.repeat!=='none'){const cl={...t},done=(t.completedDates||[]).includes(dateStr);cl.progress=done?100:0;cl.status=done?'完了':'未着手';return cl;}return t;
 }).sort((a,b)=>{const pv={highest:4,high:3,medium:2,low:1,none:0};const diff=(pv[b.priority]||0)-(pv[a.priority]||0);return diff!==0?diff:(a.startTime||'99:99').localeCompare(b.startTime||'99:99');});
}

function initOrderIfNeeded(){let chg=false;tks.filter(t=>!t.parentId).sort((a,b)=>new Date(a.start)-new Date(b.start)).forEach((t,i)=>{if(t.order===undefined||t.order===null){t.order=i;chg=true;}});new Set(tks.filter(t=>t.parentId).map(t=>t.parentId)).forEach(pid=>{tks.filter(t=>t.parentId===pid).sort((a,b)=>new Date(a.start)-new Date(b.start)).forEach((t,i)=>{if(t.order===undefined||t.order===null){t.order=i;chg=true;}});});if(chg)safeStore(SKT,JSON.stringify(tks));}
function recalcParentProgress(parentId){if(!parentId)return;const parent=tks.find(t=>t.id===parentId);if(!parent)return;const children=tks.filter(t=>t.parentId===parentId);if(!children.length)return;const avg=Math.round(children.reduce((s,c)=>s+(c.progress||0),0)/children.length);parent.progress=avg;if(avg===100)parent.status='完了';else if(avg>0&&parent.status==='未着手')parent.status='進行中';}

function renderDashboard(){
 const con=document.getElementById('dashboard-container');con.innerHTML='';
 const all=tks.filter(t=>!t.isMilestone);const total=all.length;const done=all.filter(t=>t.status==='完了'||t.progress===100).length;const inProg=all.filter(t=>t.status==='進行中'&&t.progress<100).length;const notStart=all.filter(t=>t.status==='未着手'&&t.progress===0).length;const paused=all.filter(t=>t.status==='中断').length;const overdue=all.filter(t=>isOverdue(t)).length;const rate=total>0?Math.round(done/total*100):0;

 const aStats={};Object.keys(aps).filter(n=>!aps[n].deleted).forEach(n=>{aStats[n]={total:0,done:0,sum:0};});aStats['未設定']={total:0,done:0,sum:0};all.forEach(t=>{const k=(t.assignee&&aStats[t.assignee])?t.assignee:'未設定';aStats[k].total++;if(t.status==='完了'||t.progress===100)aStats[k].done++;aStats[k].sum+=t.progress||0;});

function resolveTimeOverlap(tasks){
 const sorted=[...tasks].sort((a,b)=>a.startTime.localeCompare(b.startTime));
 const cols=[];
 sorted.forEach(t=>{
  const sm=timeToMin(t.startTime),em=t.endTime?timeToMin(t.endTime):sm+60;
  let placed=false;
  for(let i=0;i<cols.length;i++){
   const last=cols[i][cols[i].length-1];const lem=last._em||timeToMin(last.startTime)+60;
   if(sm>=lem){cols[i].push(t);t._col=i;t._em=em;placed=true;break;}
  }
  if(!placed){t._col=cols.length;t._em=em;cols.push([t]);}
 });
 const totalCols=cols.length;return sorted.map(t=>({task:t,col:t._col,totalCols}));
}

function buildRepeatDaysBtns(sel=[]){const c=document.getElementById('repeat-days-btns');c.innerHTML='';const wn=['日','月','火','水','木','金','土'];wn.forEach((_,i)=>{const btn=document.createElement('button');btn.type='button';const on=sel.includes(i);btn.className=`px-2 py-1 text-[11px] font-bold rounded border transition-all ${on?'bg-indigo-600 text-white border-indigo-600':'bg-white text-slate-600 border-slate-300 hover:bg-indigo-50'}`;btn.textContent=wn[i];btn.dataset.day=i;btn.onclick=()=>{const cur=getSelectedRepeatDays();const idx=cur.indexOf(i);if(idx>=0)cur.splice(idx,1);else cur.push(i);buildRepeatDaysBtns(cur.sort((a,b)=>a-b));};c.appendChild(btn);});}
function getSelectedRepeatDays(){const btns=document.querySelectorAll('#repeat-days-btns button');const sel=[];btns.forEach(b=>{if(b.classList.contains('bg-indigo-600'))sel.push(parseInt(b.dataset.day));});return sel;}
function toggleMilestoneUI(im){document.getElementById('modal-end-date-wrapper').style.display=im?'none':'block';document.getElementById('modal-time-wrapper').style.display=im?'none':'grid';}
function buildParentSelect(exId){const sel=document.getElementById('modal-parent-id');sel.innerHTML='<option value="">-- なし --</option>';tks.filter(t=>!t.parentId&&t.id!==exId).forEach(t=>{sel.innerHTML+=`<option value="${t.id}">${esc(t.name)}</option>`;});}

 let st=csts;if(progress===100)st='完了';else if(progress>0&&progress<100&&st==='未着手')st='進行中';let cd=[];
 if(ceid){const t=tks.find(x=>x.id===ceid);cd=t.completedDates||[];if(repeat!=='none'&&cedt){const dn=(progress===100||st==='完了');if(dn&&!cd.includes(cedt))cd.push(cedt);else if(!dn&&cd.includes(cedt))cd=cd.filter(d=>d!==cedt);progress=t.progress||0;st=t.status||'未着手';}const idx=tks.findIndex(x=>x.id===ceid);tks[idx]={...tks[idx],name,type,description,tags,url,location,color:ccol,start,end,startTime,endTime,checklist,repeat,repeatDays,priority,completedDates:cd,progress,assignee,status:st,isMilestone:im,parentId};customAlert('予定を更新しました','success');}
 else{tks.push({id:'t_'+Date.now(),name,type,description,tags,url,location,color:ccol,start,end,startTime,endTime,checklist,repeat,repeatDays,priority,completedDates:[],progress,assignee,status:st,isMilestone:im,parentId,order:tks.filter(x=>x.parentId===parentId).length});customAlert('予定を追加しました','success');}
 if(parentId)exps.add(parentId);recalcParentProgress(parentId);commitChange();saveUISettings();hideModal('task-modal');refreshViews();

// 複製の強化
// ══════════════════════════════════════════════
// 衝突しない一意なタスクIDを生成
let _idCounter=0;
function newTaskId(){return 't_'+Date.now()+'_'+(++_idCounter)+Math.random().toString(36).slice(2,6);}
// ある親IDの子タスク全体（孫含む）を取得
function getDescendants(parentId){const out=[];const stack=[parentId];while(stack.length){const pid=stack.pop();for(const c of tks){if(c.parentId===pid){out.push(c);stack.push(c.id);}}}return out;}
// 親ごと複製：選択タスクと子孫を一括コピー、日付を相対オフセットでスライド
function duplicateTaskWithChildren(){
 if(!ceid)return;const t=tks.find(x=>x.id===ceid);if(!t)return;
 const desc=getDescendants(t.id);
 if(!desc.length){duplicateTask();return;}// 子なし → 通常複製にフォールバック
 // 元の親開始日を基準に、新規開始日を訊く（既定は元の開始日と同じ）
 const origStart=t.start;
 if(!origStart||!/^\d{4}-\d{2}-\d{2}$/.test(origStart)){customAlert('親タスクに有効な開始日が設定されていないため、親ごと複製できません','danger');return;}
 const newStart=prompt(`「${t.name}」を子タスク${desc.length}件ごと複製します。\n新しい開始日（YYYY-MM-DD）を入力してください。\n空欄でキャンセル。`,origStart);
 if(!newStart)return;
 if(!/^\d{4}-\d{2}-\d{2}$/.test(newStart)){customAlert('日付の形式が正しくありません（YYYY-MM-DD）','danger');return;}
 const offsetMs=(new Date(newStart)).getTime()-(new Date(origStart)).getTime();
 if(isNaN(offsetMs)){customAlert('日付の解釈に失敗しました','danger');return;}
 const shift=ds=>{if(!ds||!/^\d{4}-\d{2}-\d{2}$/.test(ds))return ds;const d=new Date(ds);d.setTime(d.getTime()+offsetMs);return toDateStr(d);};
 // ID マッピング（旧ID→新ID）を作って parentId を再リンク
 const idMap={};idMap[t.id]=newTaskId();desc.forEach(d=>{idMap[d.id]=newTaskId();});
 const cloneOne=(src,isRoot)=>({
  ...src,
  id:idMap[src.id],
  parentId:isRoot?src.parentId:idMap[src.parentId],
  name:isRoot?src.name+'（コピー）':src.name,
  start:shift(src.start),
  end:shift(src.end),
  progress:0,status:'未着手',completedDates:[],
  checklist:safeClone(src.checklist||[],[]).map(i=>({...i,done:false})),
  favorite:false,
  order:isRoot?tks.filter(x=>x.parentId===src.parentId).length:src.order
 });
 const newTks=[cloneOne(t,true),...desc.map(d=>cloneOne(d,false))];
 tks.push(...newTks);
 if(t.parentId)exps.add(t.parentId);
 // 新しい親も展開状態にする
 exps.add(idMap[t.id]);
 commitChange();hideModal('task-modal');refreshViews();
 customAlert(`${newTks.length}件を一括複製しました（${desc.length}件の子タスク含む）`,'success');
}
// 編集中タスクの ★お気に入りをトグル（履歴に積まない・ビュー再描画もしない軽量操作）
function toggleFavorite(){
 if(!ceid)return;const t=tks.find(x=>x.id===ceid);if(!t)return;
 t.favorite=!t.favorite;

}
// 新規追加モーダルから「最近のタスクから複製」ピッカーを開く

     <span class="text-[12px] font-bold text-slate-700 truncate">${esc(t.name)}</span>${milestone}${cl}
    </div>
    <div class="flex items-center gap-2 mt-0.5 text-[10px] text-slate-500">
     <span><i class="far fa-calendar-alt mr-1"></i>${(t.start||'').replace(/-/g,'/')}</span>
     ${ass!=='未設定'?`<span class="text-slate-400">·</span><span>${esc(ass)}</span>`:''}
    </div>

   <i class="fas fa-chevron-right text-slate-300 text-[10px] mt-1.5 flex-shrink-0"></i>

 };
 const items=list.length?

 m.innerHTML=`<div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden max-h-[80vh] flex flex-col" role="dialog" aria-modal="true" aria-label="タスクから複製">
  <div class="px-4 py-3 bg-indigo-600 text-white flex justify-between items-center flex-shrink-0">
   <span class="font-bold text-sm"><i class="fas fa-copy mr-2"></i>タスクから複製</span>
   <button onclick="this.closest('.fixed').remove()" class="text-xl text-white/80 hover:text-white" aria-label="閉じる">&times;</button>
  </div>
  <div class="overflow-y-auto flex-1">${items}</div>
  <div class="px-4 py-2 border-t border-slate-100 text-[10px] text-slate-400 flex-shrink-0">選んだタスクの内容をフォームに反映します（日付は今日が初期値）</div>

 document.body.appendChild(m);

// 複製元を新規追加フォームに流し込む
function applyCloneSource(id){
 const t=tks.find(x=>x.id===id);if(!t)return;
 const cm=document.getElementById('clone-recent-modal');if(cm)cm.remove();
 // 値を反映（saveTask が読む全フィールドを埋める）
 document.getElementById('modal-task-name').value=t.name;
 buildTaskTypeSelect(t.type||'タスク');
 document.getElementById('modal-description').value=t.description||'';
 document.getElementById('modal-task-tags').value=t.tags||'';
 document.getElementById('modal-task-url').value=t.url||'';
 const locEl=document.getElementById('modal-location');if(locEl)locEl.value=t.location||'';
 document.getElementById('modal-task-repeat').value=t.repeat||'none';
 document.getElementById('modal-task-priority').value=t.priority||'none';
 if(t.repeat==='weekly'){document.getElementById('modal-repeat-days').classList.remove('hidden');buildRepeatDaysBtns(t.repeatDays||[]);}
 else{document.getElementById('modal-repeat-days').classList.add('hidden');buildRepeatDaysBtns([]);}
 document.getElementById('modal-start-time').value=t.startTime||'';
 document.getElementById('modal-end-time').value=t.endTime||'';
 selectColor(t.color||'blue');
 // 親IDは引き継ぎ（ユーザーが手動で外せる）
 buildParentSelect(null);document.getElementById('modal-parent-id').value=t.parentId||'';
 // 期間を保ちつつ開始日を今日に
 const today=new Date();const todayStr=toDateStr(today);
 if(t.start&&t.end){const span=Math.round(((new Date(t.end))-(new Date(t.start)))/86400000);const ne=new Date(today);ne.setDate(ne.getDate()+Math.max(0,span));document.getElementById('modal-start-date').value=todayStr;document.getElementById('modal-end-date').value=toDateStr(ne);}
 else{document.getElementById('modal-start-date').value=todayStr;document.getElementById('modal-end-date').value=todayStr;}
 // 進捗・ステータスはリセット
 document.getElementById('modal-progress').value=0;document.getElementById('modal-progress-value').textContent='0%';
 modalChecklist=safeClone(t.checklist||[],[]).map(i=>({...i,done:false}));renderChecklistItems();
 buildAssigneeSelect(t.assignee||'');
 document.getElementById('modal-is-milestone').checked=!!t.isMilestone;toggleMilestoneUI(!!t.isMilestone);
 selectStatus('未着手');
 customAlert(`「${t.name}」の内容を反映しました`,'success');
 setTimeout(()=>document.getElementById('modal-task-name').focus(),50);
}

// 全データ初期化 (3段階確認)

let resetStep=1;
function showResetModal(){resetStep=1;const m=document.createElement('div');m.id='reset-modal';m.className='fixed inset-0 bg-slate-900/70 z-[140] flex items-center justify-center p-4';m.innerHTML='<div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden" id="reset-modal-content" role="alertdialog" aria-modal="true" aria-label="データの初期化"></div>';document.body.appendChild(m);renderResetStep();}

function renderResetStep(){const c=document.getElementById('reset-modal-content');if(!c)return;const tc=tks.length,ac=Object.keys(aps).filter(k=>!aps[k].deleted).length;const hdr=`<div class="px-4 py-3 bg-red-600 text-white flex justify-between items-center"><span class="font-bold text-sm"><i class="fas fa-exclamation-triangle mr-2"></i>データの初期化 (${resetStep}/3)</span><button onclick="closeResetModal()" class="text-xl text-white/80 hover:text-white">&times;</button></div>`;

 habitTasks.forEach(t=>{
